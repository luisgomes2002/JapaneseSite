<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japão</title>
    <link rel="stylesheet" href="login.css">
    <script src="https://kit.fontawesome.com/0e949e0c2d.js" crossorigin="anonymous"></script>
</head>
<body>
    <!--Navbar Section -->
    <nav class="navbar">
        <div class="navbar__container">
            <a href="../index/index.html" id="navbar__logo">Japão</a>
            <div class="navbar__toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a href="../index/index.html" class="navbar__links" id="home-page"><i class="fa-solid fa-arrow-left"></i></a>
                </li>
            </ul>
        </div>
    </nav>
    
    <!-- Login -->
    <div class="login-box">
        <h2>Login</h2>  
        <form action="/login" method="POST">
            <div class="user-box">
                <input type="email" id="email" name="email" required>
                <label for="email">User</label>
            </div>
            <div class="user-box">
                <input type="password" id="password" name="password" required>
                <label for="password">Password</label>
            </div>
            <div>
                <a href="#" class="forgot__pass" >Forgot password?</a>
            </div>
            <a type="submit" class="btn__submit">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                Submit
            </a>
            <button type="submit" >Aqui</button>
            
            <a href="/register">Register</a>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
